<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ARENA_OS | Lobby</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../CSS/lobby_command_center.css">
    <script src="../JS/lobby_command_center.js" defer></script>
</head>
<body>

<header class="top-navbar">
    <div class="nav-left">
        <button id="sidebar-toggle" class="menu-btn">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="brand-text font-headline">ARENA_OS</span>
        
        <div class="search-box">
            <span class="material-symbols-outlined">search</span>
            <input id="player-search" class="search-input font-label" placeholder="LOCATE_PLAYER..." type="text"/>
        </div>
    </div>

    <div class="nav-right">
        <div class="user-quick-stats font-label">
            <span id="header-elo-display" class="stat-elo">— ELO</span>
            <span id="header-rank-display" class="stat-rank">—</span>
        </div>
        <div class="profile-avatar font-headline">
            <span id="header-initials-display">??</span>
        </div>
    </div>
</header>

<aside id="sidebar" class="sidebar">
    <div class="sidebar-profile">
        <div class="sidebar-indicator"></div>
        <div class="font-label">
            <p id="operator-name-display" class="sidebar-profile-name">OPERATOR</p>
            <p id="operator-elo-display" class="sidebar-profile-elo">— ELO</p>
        </div>
    </div>
    
    <nav class="nav-links font-label">
        <a class="nav-link active" href="lobby_command_center.html">
            <span class="material-symbols-outlined">terminal</span> Command Center
        </a>
        <a class="nav-link" href="leaderboard.html">
            <span class="material-symbols-outlined">leaderboard</span> Leaderboard
        </a>
        <a class="nav-link" href="#">
            <span class="material-symbols-outlined">swords</span> Matchmaking
        </a>
        <a id="btn-logout" class="nav-link danger">
            <span class="material-symbols-outlined">logout</span> Disconnect
        </a>
    </nav>
</aside>

<main id="main-canvas" class="main-content">
    
    <div class="page-header">
        <div>
            <h1 class="page-title font-headline">Lobby_Environment</h1>
            <p class="page-subtitle">Connect with active operators in the sector. Challenges are live.</p>
        </div>
        <div class="live-indicator font-label">
            <span class="pulse-dot"></span>
            <span id="online-count">— ONLINE</span>
        </div>
    </div>

    <div class="controls-bar">
        <button id="btn-filter-all" class="filter-btn font-label active">All_Players</button>
        <button id="btn-filter-gm" class="filter-btn font-label">Grandmasters</button>
        
        <div class="mobile-search">
            <span class="material-symbols-outlined">search</span>
            <input id="player-search-mobile" class="search-input font-label" placeholder="LOCATE_PLAYER..." type="text"/>
        </div>

        <div class="sort-dropdown font-label">
            <span class="material-symbols-outlined">filter_list</span>
            <select id="sort-select" class="sort-select font-label">
                <option value="elo-desc">Sort: Rating (Highest)</option>
                <option value="elo-asc">Sort: Rating (Lowest)</option>
                <option value="win-desc">Sort: Win Rate (Highest)</option>
                <option value="win-asc">Sort: Win Rate (Lowest)</option>
                <option value="name-asc">Sort: Name (A-Z)</option>
                <option value="name-desc">Sort: Name (Z-A)</option>
            </select>
        </div>
    </div>

    <div id="player-grid" class="player-grid">
        </div>
</main>

<nav class="mobile-nav">
    <a class="mobile-link font-label active" href="lobby_command_center.html">
        <span class="material-symbols-outlined">sports_esports</span>
        <span>Lobby</span>
    </a>
    <a class="mobile-link font-label" href="leaderboard.html">
        <span class="material-symbols-outlined">leaderboard</span>
        <span>Leaderboard</span>
    </a>
</nav>


<template id="empty-state-template">
    <div class="empty-state">
        <span class="material-symbols-outlined" style="font-size: 4rem;">radar</span>
        <p class="font-headline" style="font-size: 1.25rem; font-weight: 700; margin-top: 1rem;">NO OPERATORS FOUND</p>
        <p class="font-label" style="font-size: 0.75rem; margin-top: 0.5rem;">Backend may be offline or no players in database</p>
    </div>
</template>

<template id="player-card-template">
    <div class="player-card font-label">
        <div class="card-header">
            <div class="card-avatar font-headline">
                <span class="js-initials"></span>
            </div>
            <div class="card-stats">
                <p class="card-rank js-rank"></p>
                <p class="card-elo js-elo font-headline"></p>
                <p class="card-winrate js-winrate"></p>
            </div>
        </div>
        
        <div class="card-body">
            <h3 class="card-name js-name font-headline"></h3>
            <p class="card-uid js-uid"></p>
            
            <div class="status-badge js-badge">
                <span class="status-dot"></span>
                <span class="js-status-text">STATUS</span>
            </div>
        </div>
        
        <button class="card-btn js-btn font-label">
            <span class="material-symbols-outlined js-btn-icon"></span>
            <span class="js-btn-text">ACTION</span>
        </button>
    </div>
</template>

</body>
</html>
