<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ARENA_OS | Secure Login</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../CSS/login.css">

    <script src="../JS/login.js" defer></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#131313",
                        "surface-container-highest": "#353534",
                        "on-surface": "#e5e2e1",
                        "primary": "#adc6ff",
                        "secondary": "#4edea3",
                        "surface-container-low": "#1c1b1b",
                        "on-surface-variant": "#c2c6d6",
                        "primary-container": "#4d8eff",
                        "on-primary-fixed": "#001a42",
                        "surface-container-lowest": "#0e0e0e",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-[#131313] text-[#e5e2e1] font-body selection:bg-primary selection:text-[#002e6a] overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 bg-[#131313]/60 backdrop-blur-xl flex justify-between items-center px-6 h-16 shadow-[0_0_20px_rgba(59,130,246,0.12)]">
        <div class="flex items-center gap-2">
            <span class="text-xl font-black italic text-[#ADC6FF] font-headline tracking-tighter uppercase">ARENA_OS</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex flex-col items-end">
                <span class="font-label text-[10px] tracking-widest text-[#c2c6d6]/60 uppercase">SYSTEM STATUS</span>
                <span class="font-label text-xs font-bold text-[#4edea3]">ENCRYPTED_NODE_07</span>
            </div>
            <div class="w-10 h-10 rounded-lg bg-[#201f1f] flex items-center justify-center border border-[#424754]/10">
                <span class="material-symbols-outlined text-[#adc6ff]">security</span>
            </div>
        </div>
    </header>

    <main class="relative min-h-screen flex flex-col items-center justify-center pt-16 p-4">
        
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/5 blur-[120px] rounded-full"></div>
        </div>

        <div class="w-full max-w-xl z-10 flex flex-col items-center">
            
            <div class="text-center mb-10">
                <h1 class="font-headline font-black text-6xl md:text-8xl tracking-tighter text-on-surface mb-2 italic">ARENA</h1>
                <div class="flex items-center justify-center gap-4">
                    <div class="h-[1px] w-12 bg-[#424754]/30"></div>
                    <p class="font-label text-sm tracking-[0.4em] text-primary uppercase">Identity Verification Required</p>
                    <div class="h-[1px] w-12 bg-[#424754]/30"></div>
                </div>
            </div>

            <div class="relative w-full aspect-video md:aspect-[16/10] bg-surface-container-low rounded-xl overflow-hidden border border-[#424754]/20 shadow-2xl group">
                
                <div id="camera-container" class="absolute inset-0 z-0">
                    <video id="webcam" autoplay playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
                    <canvas id="snapshot" class="hidden"></canvas>
                    
                    <img id="captured-frame" class="hidden w-full h-full object-cover scale-x-[-1]" />
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-surface-dim via-transparent to-transparent pointer-events-none"></div>
                    <div id="flash-overlay" class="absolute inset-0 pointer-events-none"></div>
                </div>

                <div class="absolute inset-0 z-10 p-4 flex flex-col justify-between pointer-events-none">
                    <div class="flex justify-between">
                        <div class="w-8 h-8 border-t-2 border-l-2 border-primary/40 rounded-tl-sm"></div>
                        <div class="w-8 h-8 border-t-2 border-r-2 border-primary/40 rounded-tr-sm"></div>
                    </div>
                    <div class="absolute inset-8 border border-primary/10 bg-[radial-gradient(#adc6ff_1px,transparent_1px)] [background-size:20px_20px] opacity-20"></div>
                    <div class="scanning-line"></div>
                    
                    <div class="flex justify-between items-end">
                        <div class="w-8 h-8 border-b-2 border-l-2 border-primary/40 rounded-bl-sm"></div>
                        <div class="w-8 h-8 border-b-2 border-r-2 border-primary/40 rounded-br-sm"></div>
                    </div>
                </div>

                <div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                    <div class="w-48 h-48 md:w-64 md:h-64 border border-dashed border-primary/30 rounded-full flex items-center justify-center">
                        <div class="w-40 h-40 md:w-56 md:h-56 border-2 border-primary/20 rounded-full flex items-center justify-center animate-[spin_10s_linear_infinite]">
                            <div class="absolute top-0 w-2 h-2 bg-primary rounded-full shadow-[0_0_10px_#adc6ff]"></div>
                        </div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="material-symbols-outlined text-5xl md:text-7xl text-primary/40">face_5</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-12 w-full flex flex-col items-center gap-8">
                
                <div class="flex items-center gap-3">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-secondary"></span>
                    </span>
                    <span id="system-status-text" class="font-label text-sm font-bold tracking-widest text-on-surface uppercase">SYSTEM READY: AWAITING INPUT</span>
                </div>

                <button id="scan-btn" class="pulse-glow relative group bg-gradient-to-br from-primary to-primary-container px-12 py-5 rounded-lg overflow-hidden transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_0_30px_rgba(173,198,255,0.2)]">
                    <div class="relative z-10 flex items-center gap-4">
                        <span class="material-symbols-outlined text-on-primary-fixed text-2xl" data-icon="fingerprint" data-weight="fill">fingerprint</span>
                        <span id="btn-text" class="font-headline font-black text-xl text-on-primary-fixed tracking-widest uppercase">SCAN IDENTITY</span>
                    </div>
                    <div class="absolute top-0 -left-[100%] w-full h-full bg-white/20 skew-x-[-20deg] group-hover:left-[100%] transition-all duration-1000"></div>
                </button>

                <div class="mt-4 flex justify-center w-full">
                    <div class="bg-surface-container-lowest p-3 border-l-2 border-primary/30 rounded-r-lg px-8">
                        <div class="font-label text-[10px] text-primary uppercase mb-1 text-center">Auth_Protocol</div>
                        <div class="font-label text-xs text-[#c2c6d6] font-medium text-center">BIOMETRIC_VAULT_v2.4</div>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <div class="hidden lg:block fixed left-8 top-1/2 -translate-y-1/2 rotate-180 [writing-mode:vertical-rl] space-y-4">
        <span class="font-label text-[10px] tracking-[1em] text-[rgba(144,164,239,0.45)] uppercase">SECURE TERMINAL ACCESS GRANTED</span>
        <div class="h-24 w-[1px] bg-[rgba(144,164,239,0.2)] mx-auto"></div>
    </div>
    <div class="hidden lg:block fixed right-8 top-1/2 -translate-y-1/2 [writing-mode:vertical-rl] space-y-4">
        <span class="font-label text-[10px] tracking-[1em] text-[rgba(144,164,239,0.45)] uppercase">ENCRYPTED DATA STREAM ACTIVE</span>
        <div class="h-24 w-[1px] bg-[rgba(144,164,239,0.2)] mx-auto"></div>
    </div>

</body>
</html>
