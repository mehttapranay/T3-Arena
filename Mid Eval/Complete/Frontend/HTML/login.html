<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ARENA_OS | Secure Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../CSS/login.css"/>
    <script src="../JS/login.js" defer></script>
</head>
<body>

    <div id="slanted-bg" aria-hidden="true"></div>

    <header id="site-header">
        <div class="header-logo">
            <span class="logo-text">ARENA_OS</span>
        </div>
        <div class="header-right">
            <div class="header-status">
                <span class="status-lbl">SYSTEM STATUS</span>
                <span class="status-val">ENCRYPTED_NODE_01</span>
            </div>
            <div class="header-icn">
                <span class="material-symbols-outlined">security</span>
            </div>
        </div>
    </header>

    <main id="main-container">

        <div id="ambient-bg" aria-hidden="true">
            <div class="blob blob-primary"></div>
            <div class="blob blob-sec"></div>
        </div>

        <div id="center-card">

            <div id="page-title">
                <h1 class="arena-heading">ARENA</h1>
                <div class="title-sub">
                    <div class="divider-line"></div>
                    <p class="sub-text">Identity Verification Required</p>
                    <div class="divider-line"></div>
                </div>
            </div>

            <div id="cam-view">
                <div id="cam-container">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="snapshot" class="hidden"></canvas>
                    <img id="captured-frame" class="hidden" alt="Captured biometric frame"/>
                    <div class="gradient-fade" aria-hidden="true"></div>
                </div>
            </div>

            <div id="controls">

                <div id="status-ind">
                    <span class="static-dot" aria-hidden="true"></span>
                    <span id="sys-status-txt" class="dyn-status-txt">SYSTEM READY: AWAITING INPUT</span>
                </div>

                <button id="scan-btn">
                    <div class="scan-btn-inner">
                        <span class="material-symbols-outlined scan-btn-icn">fingerprint</span>
                        <span id="btn-text">SCAN IDENTITY</span>
                    </div>
                </button>

                <div id="auth-badge-wrap">
                    <div id="auth-badge">
                        <div class="auth-lbl">Auth_Protocol</div>
                        <div class="auth-val">BIOMETRIC_VAULT_v2.4</div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div class="side-lbl side-lbl-left" aria-hidden="true">
        <span class="side-text">SECURE TERMINAL ACCESS GRANTED</span>
        <div class="side-line"></div>
    </div>
    <div class="side-lbl side-lbl-right" aria-hidden="true">
        <span class="side-text">ENCRYPTED DATA STREAM ACTIVE</span>
        <div class="side-line"></div>
    </div>

</body>
</html>
